name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 设置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 3.5 安装 Node.js 并同步 Capacitor 资源
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies & Capacitor sync
        run: |
          # 安装原生模块编译所需的工具
          sudo apt-get update
          sudo apt-get install -y python3 make g++
          npm install
          npx cap sync android

      # 4. 修复 Gradle wrapper（替换阿里云镜像为官方源）
      - name: Fix Gradle wrapper distributionUrl
        run: |
          PROPS="android/gradle/wrapper/gradle-wrapper.properties"
          echo "--- Before ---"
          cat "$PROPS"
          python3 -c "
          import re
          with open('$PROPS', 'r') as f:
              content = f.read()
          content = re.sub(r'distributionUrl=.*', r'distributionUrl=https\\\\://services.gradle.org/distributions/gradle-8.5-bin.zip', content)
          with open('$PROPS', 'w') as f:
              f.write(content)
          "
          echo "--- After ---"
          cat "$PROPS"

      # 5. 给 gradlew 加执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # 6. 缓存 Gradle 依赖（加速二次构建）
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 7. 构建 Debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8"

      # 8. 上传 APK 为构建产物（可下载，保留 7 天）
      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatroom-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # 9. 在 Release 中发布 APK
      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "ChatRoom App - 最新构建"
          body: |
            ## ChatRoom Android APK

            **构建时间**: ${{ github.event.head_commit.timestamp }}
            **提交**: ${{ github.sha }}
            **提交说明**: ${{ github.event.head_commit.message }}

            ### 安装方法
            1. 下载下方的 `app-debug.apk`
            2. 在手机上允许「安装未知来源应用」
            3. 安装即可使用

            > 这是 Debug 版本，仅供测试使用
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
